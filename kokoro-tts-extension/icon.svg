<svg width="128" height="128" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">

  <defs>
    <!-- New warm-to-cool warning-style gradient -->
    <linearGradient id="waveGradient" x1="200" y1="512" x2="824" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C853"></stop>  <!-- green -->
      <stop offset="35%" stop-color="#FFEB3B"></stop> <!-- yellow -->
      <stop offset="65%" stop-color="#FF9800"></stop> <!-- orange -->
      <stop offset="100%" stop-color="#F44336"></stop> <!-- red -->
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="512" cy="512" r="512" fill="#000000"></circle>

  <!-- Glow layer -->
  <path d="M160 512
       L300 512
       C330 512, 340 400, 370 400
       C400 400, 410 640, 440 640
       C470 640, 480 320, 520 320
       C560 320, 570 700, 610 700
       C650 700, 660 420, 700 420
       C740 420, 760 512, 800 512
       L860 512" stroke="url(#waveGradient)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" opacity="0.7"></path>

  <!-- Main wave -->
  <path d="M160 512
       L300 512
       C330 512, 340 400, 370 400
       C400 400, 410 640, 440 640
       C470 640, 480 320, 520 320
       C560 320, 570 700, 610 700
       C650 700, 660 420, 700 420
       C740 420, 760 512, 800 512
       L860 512" stroke="url(#waveGradient)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>

</svg>