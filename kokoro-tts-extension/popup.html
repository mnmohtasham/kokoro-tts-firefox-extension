<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { width: 336px; }
    body {
      width: 336px;
      min-height: 120px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #eaf0ff;
      padding: 14px;
      background:
        radial-gradient(1200px 600px at -10% -20%, rgba(120, 119, 198, 0.55), transparent 60%),
        radial-gradient(900px 500px at 110% 0%, rgba(56, 189, 248, 0.35), transparent 55%),
        radial-gradient(800px 500px at 50% 120%, rgba(236, 72, 153, 0.25), transparent 60%),
        linear-gradient(180deg, #0b1220, #070a12);
      overflow: hidden;
    }

    :root {
      --card: rgba(255,255,255,0.06);
      --card2: rgba(255,255,255,0.08);
      --stroke: rgba(255,255,255,0.12);
      --muted: rgba(234,240,255,0.72);
      --muted2: rgba(234,240,255,0.55);
      --brandA: #38bdf8;
      --brandB: #a78bfa;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 13px;
      letter-spacing: 0.4px;
      font-weight: 700;
      color: #eaf0ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-badge {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--brandA), var(--brandB));
      box-shadow: 0 6px 16px rgba(56,189,248,0.25);
      position: relative;
      overflow: hidden;
    }
    .app-badge::after {
      content: '';
      position: absolute;
      inset: -40%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), transparent 40%);
      transform: rotate(20deg);
      opacity: 0.75;
      animation: sheen 4s linear infinite;
    }
    @keyframes sheen {
      0% { transform: translateX(-20%) rotate(20deg); }
      100% { transform: translateX(20%) rotate(20deg); }
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pin-btn {
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      color: var(--muted2);
      transition: transform 0.18s ease, color 0.18s ease;
      padding: 0;
      line-height: 1;
    }
    .pin-btn:hover { color: #fff; transform: translateY(-1px); }
    .pin-btn.pinned { color: #fff; transform: rotate(45deg); }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 4px rgba(34,197,94,0.12); }
    .status-dot.offline { background: #fb7185; box-shadow: 0 0 0 4px rgba(251,113,133,0.14); }
    .card {
      background: linear-gradient(180deg, var(--card2), var(--card));
      border-radius: 14px;
      border: 1px solid var(--stroke);
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .network-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
    }
    .network-toggle span { color: var(--muted2); transition: color 0.18s ease; }
    .network-toggle span.active { color: #fff; font-weight: 650; }
    .switch { position: relative; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(56,189,248,0.9), rgba(167,139,250,0.9));
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.3s;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .switch input:checked + .slider { background: linear-gradient(135deg, rgba(251,113,133,0.95), rgba(167,139,250,0.95)); }
    .switch input:checked + .slider::before { transform: translateX(18px); }
    .now-playing { display: none; }
    .current-text {
      font-size: 13px;
      color: rgba(234,240,255,0.92);
      margin-bottom: 8px;
      max-height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(56,189,248,0.95), rgba(167,139,250,0.95));
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text { font-size: 11px; color: rgba(234,240,255,0.55); text-align: right; }
    .idle-message {
      text-align: center;
      color: rgba(234,240,255,0.55);
      font-size: 13px;
      padding: 8px 0;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .controls button {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .controls button:hover { transform: translateY(-1px); background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.18); }
    .controls button:active { transform: translateY(0px) scale(0.98); }
    .controls button.primary {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--brandA), var(--brandB));
      color: white;
      font-size: 18px;
      border: 0;
      box-shadow: 0 14px 28px rgba(56,189,248,0.18);
    }
    .actions { display: flex; gap: 8px; }
    .actions button {
      flex: 1;
      padding: 9px 10px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
      cursor: pointer;
      font-size: 12px;
      color: #fff;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .actions button:hover { transform: translateY(-1px); background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.22); }
    .settings { display: flex; gap: 8px; }
    .settings select {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      outline: none;
    }
    .settings select:focus { border-color: rgba(56,189,248,0.45); box-shadow: 0 0 0 4px rgba(56,189,248,0.12); }
    .gpu-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #777;
    }
    .gpu-stats .gpu-label { white-space: nowrap; font-weight: 600; color: #555; }
    .gpu-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
    }
    .gpu-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00c853, #ffab00);
      border-radius: 3px;
      width: 0%;
      transition: width 0.5s;
    }
    .gpu-bar-fill.high { background: linear-gradient(90deg, #ffab00, #ff5252); }
    .gpu-text { white-space: nowrap; min-width: 70px; text-align: right; color: rgba(234,240,255,0.75); }
    .summarize-btn {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #555;
      transition: all 0.2s;
    }
    .summarize-btn:hover { border-color: #7b2ff7; color: #7b2ff7; }
    .summarize-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .summary-result { display: none; margin-top: 10px; }
    .summary-text {
      font-size: 12px;
      color: rgba(234,240,255,0.92);
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0,0,0,0.18);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.10);
    }
    .summary-model { font-size: 10px; color: rgba(234,240,255,0.55); margin-top: 6px; }
    .summary-actions { margin-top: 8px; display: flex; gap: 8px; }
    .summary-actions button {
      flex: 1;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
      cursor: pointer;
      font-size: 11px;
      color: #fff;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .summary-actions button:hover { transform: translateY(-1px); background: rgba(255,255,255,0.10); border-color: rgba(56,189,248,0.35); }
    .summary-error { font-size: 12px; color: #fb7185; padding: 8px; }
    .summary-loading {
      text-align: center;
      font-size: 12px;
      color: rgba(234,240,255,0.65);
      padding: 12px 0;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.18);
      border-top-color: rgba(56,189,248,0.95);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="app-badge"></span>Page TTS</h1>
    <div class="header-right">
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking...</span>
      </div>
      <button id="pinBtn" class="pin-btn" title="Pin window">&#128204;</button>
    </div>
  </div>

  <div class="card">
    <div class="network-toggle">
      <span id="lanLabel" class="active">IP1</span>
      <label class="switch">
        <input type="checkbox" id="networkSwitch">
        <span class="slider"></span>
      </label>
      <span id="vpnLabel">IP2</span>
    </div>
  </div>

  <div class="controls">
    <button id="prevBtn" title="Previous">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M7 6v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M18 6l-7 6 7 6V6z" fill="currentColor"/>
      </svg>
    </button>
    <button id="playPauseBtn" class="primary" title="Play / Pause">
      <span id="playIcon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M9 7l10 5-10 5V7z" fill="currentColor"/>
        </svg>
      </span>
      <span id="pauseIcon" style="display:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M7 5h4v14H7V5zm6 0h4v14h-4V5z" fill="currentColor"/>
        </svg>
      </span>
    </button>
    <button id="stopBtn" title="Stop">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M7 7h10v10H7V7z" fill="currentColor"/>
      </svg>
    </button>
    <button id="nextBtn" title="Next">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M17 6v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M6 6l7 6-7 6V6z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <div class="card">
    <div id="nowPlaying" class="now-playing">
      <div id="currentText" class="current-text">Loading...</div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="progress-text">
        <span id="progressCurrent">0</span> / <span id="progressTotal">0</span>
      </div>
    </div>
    <div id="idleMessage" class="idle-message">Select text or a page to read aloud</div>
  </div>

  <div class="card">
    <div class="actions">
      <button id="readPageBtn">Read Page</button>
      <button id="summarizeBtn" class="summarize-btn">Summarize Page</button>
    </div>
    <div id="summaryLoading" class="summary-loading" style="display:none;">
      <span class="spinner"></span>Summarizing...
    </div>
    <div id="summaryResult" class="summary-result">
      <div id="summaryText" class="summary-text"></div>
      <div id="summaryModel" class="summary-model"></div>
      <div class="summary-actions">
        <button id="readSummaryBtn">Read Aloud</button>
        <button id="copySummaryBtn">Copy</button>
      </div>
    </div>
    <div id="summaryError" class="summary-error" style="display:none;"></div>
  </div>

  <div class="card">
    <div class="settings">
      <select id="voiceSelect">
        <option value="af_heart">Heart (American Female)</option>
        <option value="af_bella">Bella (American Female)</option>
        <option value="am_adam">Adam (American Male)</option>
        <option value="bf_emma">Emma (British Female)</option>
      </select>
      <select id="modeSelect">
        <option value="fast">Fast</option>
        <option value="balanced" selected>Balanced</option>
        <option value="quality">Quality</option>
      </select>
    </div>
  </div>

  <div class="card" id="gpuCard" style="display:none;">
    <div class="gpu-stats">
      <span class="gpu-label">GPU</span>
      <div class="gpu-bar">
        <div class="gpu-bar-fill" id="gpuBarFill"></div>
      </div>
      <span class="gpu-text" id="gpuText">--</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
