<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { width: 320px; }
    body {
      width: 320px;
      min-height: 100px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 16px;
      background: linear-gradient(90deg, #0095ff, #7b2ff7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pin-btn {
      width: 22px;
      height: 22px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      color: #bbb;
      transition: color 0.2s, transform 0.2s;
      padding: 0;
      line-height: 1;
    }
    .pin-btn:hover { color: #7b2ff7; }
    .pin-btn.pinned { color: #7b2ff7; transform: rotate(45deg); }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #666;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00c853;
    }
    .status-dot.offline { background: #ff5252; }
    .card {
      background: white;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .network-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
    }
    .network-toggle span { color: #999; transition: color 0.2s; }
    .network-toggle span.active { color: #333; font-weight: 600; }
    .switch { position: relative; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #0095ff;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .switch input:checked + .slider { background: #7b2ff7; }
    .switch input:checked + .slider::before { transform: translateX(18px); }
    .now-playing { display: none; }
    .current-text {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
      max-height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress-bar {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0095ff, #7b2ff7);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text { font-size: 11px; color: #999; text-align: right; }
    .idle-message {
      text-align: center;
      color: #999;
      font-size: 13px;
      padding: 8px 0;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .controls button {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #f0f0f0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #555;
      transition: background 0.2s;
    }
    .controls button:hover { background: #e0e0e0; }
    .controls button.primary {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #0095ff, #7b2ff7);
      color: white;
      font-size: 18px;
    }
    .controls button.primary:hover { opacity: 0.9; }
    .actions { display: flex; gap: 8px; }
    .actions button {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #555;
      transition: all 0.2s;
    }
    .actions button:hover { border-color: #0095ff; color: #0095ff; }
    .settings { display: flex; gap: 8px; }
    .settings select {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      background: white;
      color: #333;
    }
    .gpu-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #777;
    }
    .gpu-stats .gpu-label { white-space: nowrap; font-weight: 600; color: #555; }
    .gpu-bar {
      flex: 1;
      height: 6px;
      background: #eee;
      border-radius: 3px;
      overflow: hidden;
    }
    .gpu-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00c853, #ffab00);
      border-radius: 3px;
      width: 0%;
      transition: width 0.5s;
    }
    .gpu-bar-fill.high { background: linear-gradient(90deg, #ffab00, #ff5252); }
    .gpu-text { white-space: nowrap; min-width: 70px; text-align: right; }
    .summarize-btn {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #555;
      transition: all 0.2s;
    }
    .summarize-btn:hover { border-color: #7b2ff7; color: #7b2ff7; }
    .summarize-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .summary-result { display: none; margin-top: 10px; }
    .summary-text {
      font-size: 12px;
      color: #444;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
      padding: 8px;
      background: #f9f9fb;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .summary-model { font-size: 10px; color: #aaa; margin-top: 4px; }
    .summary-actions { margin-top: 8px; display: flex; gap: 8px; }
    .summary-actions button {
      flex: 1;
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 11px;
      color: #555;
    }
    .summary-actions button:hover { border-color: #0095ff; color: #0095ff; }
    .summary-error { font-size: 12px; color: #ff5252; padding: 8px; }
    .summary-loading {
      text-align: center;
      font-size: 12px;
      color: #999;
      padding: 12px 0;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ddd;
      border-top-color: #7b2ff7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Page TTS</h1>
    <div class="header-right">
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking...</span>
      </div>
      <button id="pinBtn" class="pin-btn" title="Pin window">&#128204;</button>
    </div>
  </div>

  <div class="card">
    <div class="network-toggle">
      <span id="lanLabel" class="active">IP1</span>
      <label class="switch">
        <input type="checkbox" id="networkSwitch">
        <span class="slider"></span>
      </label>
      <span id="vpnLabel">IP2</span>
    </div>
  </div>

  <div class="controls">
    <button id="prevBtn" title="Previous">&#9664;&#9664;</button>
    <button id="playPauseBtn" class="primary" title="Play / Pause">
      <span id="playIcon">&#9654;</span>
      <span id="pauseIcon" style="display:none;">&#9646;&#9646;</span>
    </button>
    <button id="stopBtn" title="Stop">&#9632;</button>
    <button id="nextBtn" title="Next">&#9654;&#9654;</button>
  </div>

  <div class="card">
    <div id="nowPlaying" class="now-playing">
      <div id="currentText" class="current-text">Loading...</div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="progress-text">
        <span id="progressCurrent">0</span> / <span id="progressTotal">0</span>
      </div>
    </div>
    <div id="idleMessage" class="idle-message">Select text or a page to read aloud</div>
  </div>

  <div class="card">
    <div class="actions">
      <button id="readPageBtn">Read Page</button>
      <button id="summarizeBtn" class="summarize-btn">Summarize Page</button>
    </div>
    <div id="summaryLoading" class="summary-loading" style="display:none;">
      <span class="spinner"></span>Summarizing...
    </div>
    <div id="summaryResult" class="summary-result">
      <div id="summaryText" class="summary-text"></div>
      <div id="summaryModel" class="summary-model"></div>
      <div class="summary-actions">
        <button id="readSummaryBtn">Read Aloud</button>
        <button id="copySummaryBtn">Copy</button>
      </div>
    </div>
    <div id="summaryError" class="summary-error" style="display:none;"></div>
  </div>

  <div class="card">
    <div class="settings">
      <select id="voiceSelect">
        <option value="af_heart">Heart (American Female)</option>
        <option value="af_bella">Bella (American Female)</option>
        <option value="am_adam">Adam (American Male)</option>
        <option value="bf_emma">Emma (British Female)</option>
      </select>
      <select id="modeSelect">
        <option value="fast">Fast</option>
        <option value="balanced" selected>Balanced</option>
        <option value="quality">Quality</option>
      </select>
    </div>
  </div>

  <div class="card" id="gpuCard" style="display:none;">
    <div class="gpu-stats">
      <span class="gpu-label">GPU</span>
      <div class="gpu-bar">
        <div class="gpu-bar-fill" id="gpuBarFill"></div>
      </div>
      <span class="gpu-text" id="gpuText">--</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
