<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320, initial-scale=1, maximum-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --online: #39ff14;
      --online-dim: rgba(57, 255, 20, 0.14);
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.18);
      --accent-border: rgba(56, 189, 248, 0.35);
      --glass: rgba(10, 14, 24, 0.78);
      --card: rgba(255, 255, 255, 0.06);
      --stroke: rgba(255, 255, 255, 0.14);
      --text: #eaf0ff;
      --muted: rgba(234, 240, 255, 0.55);
      --danger: #fb7185;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      --btn-radius: 12px;
      --popup-w: 320px;
    }

    html {
      width: var(--popup-w);
      min-width: var(--popup-w);
      max-width: var(--popup-w);
    }

    body {
      width: var(--popup-w);
      min-width: var(--popup-w);
      max-width: var(--popup-w);
      min-height: 420px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: var(--glass);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .popup-shell {
      width: var(--popup-w);
      height: 100%;
      max-height: 560px;
      padding: 12px;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .ui-btn {
      padding: 6px 10px;
      border: 1px solid var(--stroke);
      border-radius: var(--btn-radius);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .ui-btn:hover { border-color: var(--accent-border); background: rgba(255, 255, 255, 0.1); }

    .ui-btn-accent {
      border-color: var(--accent-border);
      background: rgba(56, 189, 248, 0.1);
      color: var(--text);
    }

    .ui-btn-accent:hover { background: rgba(56, 189, 248, 0.16); }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    /* Header */
    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .app-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      border-radius: 6px;
    }

    .brand h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-pill {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--online-dim);
      border: 1px solid rgba(57, 255, 20, 0.35);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--online);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .status-pill.offline {
      background: rgba(255, 77, 109, 0.12);
      border-color: rgba(255, 77, 109, 0.35);
      color: var(--danger);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--online);
      box-shadow: 0 0 8px var(--online);
      flex-shrink: 0;
    }

    .status-pill.offline .status-dot {
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }

    #statusText {
      white-space: nowrap;
    }

    .pin-btn {
      justify-self: end;
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.55);
      font-size: 15px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s ease, transform 0.15s ease;
    }

    .pin-btn:hover { color: #fff; }
    .pin-btn.pinned { color: var(--accent); transform: rotate(45deg); }

    /* IP segment */
    .ip-segment {
      display: flex;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--stroke);
      border-radius: var(--btn-radius);
      padding: 3px;
      margin-bottom: 10px;
      backdrop-filter: blur(10px);
    }

    .ip-option {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      padding: 8px 8px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .ip-option.active {
      background: rgba(56, 189, 248, 0.2);
      border: 1px solid var(--accent-border);
      color: var(--accent);
    }

    /* Field blocks */
    .field {
      margin-bottom: 8px;
    }

    .field-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .select-wrap {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--stroke);
      border-radius: var(--btn-radius);
      min-height: 40px;
      backdrop-filter: blur(10px);
    }

    .select-icon {
      flex-shrink: 0;
      width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .select-wrap select {
      flex: 1;
      min-width: 0;
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 32px 10px 0;
      outline: none;
      cursor: pointer;
    }

    .select-chevron {
      position: absolute;
      right: 12px;
      pointer-events: none;
      color: var(--muted);
      font-size: 10px;
    }

    /* Action cards — always side by side */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
      width: 100%;
    }

    .action-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 4px;
      padding: 10px 6px;
      border: 1px solid var(--stroke);
      border-radius: var(--btn-radius);
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.15s ease;
      color: inherit;
      font: inherit;
      min-height: 0;
      height: 88px;
      backdrop-filter: blur(10px);
    }

    .action-card:hover:not(:disabled) {
      border-color: var(--accent-border);
      transform: translateY(-1px);
    }

    .action-card:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .action-card.is-busy .action-sub::after {
      content: '…';
      animation: pulse 1s ease infinite;
    }

    @keyframes pulse {
      50% { opacity: 0.4; }
    }

    .action-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      color: var(--accent);
    }

    .action-icon svg {
      width: 16px;
      height: 16px;
    }

    .action-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .action-sub {
      font-size: 9px;
      color: var(--muted);
      line-height: 1.2;
    }

    /* Summary block */
    .summary-block {
      margin-bottom: 12px;
    }

    .summary-loading {
      display: none;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 10px 0;
    }

    .summary-result { display: none; }

    .summary-text {
      font-size: 12px;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      color: var(--text);
    }

    .summary-model {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    .summary-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .summary-actions button {
      flex: 1;
    }

    .summary-error {
      display: none;
      font-size: 12px;
      color: var(--danger);
      padding: 8px 10px;
      background: rgba(255, 77, 109, 0.08);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 77, 109, 0.25);
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* GPU */
    .gpu-card {
      display: none;
      margin-bottom: 8px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--stroke);
      border-radius: var(--btn-radius);
      backdrop-filter: blur(10px);
    }

    .gpu-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .gpu-label {
      font-weight: 700;
      color: var(--accent);
      font-size: 10px;
      letter-spacing: 0.06em;
    }

    .gpu-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .gpu-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .gpu-bar-fill.high {
      background: var(--danger);
    }

    .gpu-text {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Player footer */
    .player-footer {
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px solid var(--stroke);
    }

    .progress-section {
      margin-bottom: 12px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-labels span:last-child {
      color: rgba(255, 255, 255, 0.35);
    }

    .progress-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 999px;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
      transition: width 0.3s ease;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .controls button {
      border: none;
      background: transparent;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: color 0.15s ease, transform 0.15s ease;
    }

    .controls button:hover {
      color: #fff;
      transform: scale(1.05);
    }

    .controls button.primary {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(56, 189, 248, 0.22);
      color: var(--text);
      border: 1px solid var(--accent-border);
      box-shadow: 0 0 16px rgba(56, 189, 248, 0.25);
      flex-shrink: 0;
    }

    .controls button.primary:hover {
      background: rgba(56, 189, 248, 0.32);
      transform: scale(1.04);
    }

    .controls button.primary svg {
      display: block;
    }
  </style>
</head>
<body>
  <div class="popup-shell">
  <header class="header">
    <div class="brand">
      <img class="app-icon" src="icon.svg" alt="">
      <h1>TTS Reader</h1>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">…</span>
    </div>
    <button type="button" id="pinBtn" class="pin-btn" title="Pin window" aria-label="Pin window">📌</button>
  </header>

  <div class="ip-segment" role="group" aria-label="API endpoint">
    <button type="button" id="lanLabel" class="ip-option active" data-mode="lan">Server 1</button>
    <button type="button" id="vpnLabel" class="ip-option" data-mode="vpn">Server 2</button>
    <input type="checkbox" id="networkSwitch" class="sr-only" aria-hidden="true" tabindex="-1">
  </div>

  <div class="field">
    <label class="field-label" for="voiceSelect">Voice profile</label>
    <div class="select-wrap">
      <span class="select-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3z" stroke="currentColor" stroke-width="2"/>
          <path d="M6 20h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 11v1a3 3 0 0 0 6 0v-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <select id="voiceSelect" aria-label="Voice profile"></select>
      <span class="select-chevron" aria-hidden="true">▼</span>
    </div>
  </div>

  <div class="field">
    <label class="field-label" for="modeSelect">Playback speed</label>
    <div class="select-wrap">
      <span class="select-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 3v3M12 18v3M3 12h3M18 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
      <select id="modeSelect" aria-label="Playback speed">
        <option value="fast">Fast (1.25×)</option>
        <option value="balanced" selected>Balanced (1×)</option>
        <option value="quality">Quality (0.9×)</option>
      </select>
      <span class="select-chevron" aria-hidden="true">▼</span>
    </div>
  </div>

  <div class="action-grid">
    <button type="button" id="readPageBtn" class="action-card">
      <span class="action-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 5h7v14H5V5zm7 0h7v14h-7V5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="action-title">Read Page</span>
      <span class="action-sub">Full narration</span>
    </button>
    <button type="button" id="summarizeBtn" class="action-card">
      <span class="action-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 4h10v16H7V4z" stroke="currentColor" stroke-width="2"/>
          <path d="M9 8h6M9 12h6M9 16h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="action-title">Summarize</span>
      <span class="action-sub" id="summarizeSub">Key insights</span>
    </button>
  </div>

  <div class="summary-block">
    <div id="summaryLoading" class="summary-loading">
      <span class="spinner"></span>Summarizing…
    </div>
    <div id="summaryResult" class="summary-result">
      <div id="summaryText" class="summary-text"></div>
      <div id="summaryModel" class="summary-model"></div>
      <div class="summary-actions">
        <button type="button" id="readSummaryBtn" class="ui-btn ui-btn-accent">Read Aloud</button>
        <button type="button" id="copySummaryBtn" class="ui-btn">Copy</button>
      </div>
    </div>
    <div id="summaryError" class="summary-error"></div>
  </div>

  <div class="gpu-card" id="gpuCard">
    <div class="gpu-stats">
      <span class="gpu-label">GPU</span>
      <div class="gpu-bar">
        <div class="gpu-bar-fill" id="gpuBarFill"></div>
      </div>
      <span class="gpu-text" id="gpuText">--</span>
    </div>
  </div>

  <footer class="player-footer">
    <div id="nowPlaying" class="progress-section">
      <div class="progress-labels">
        <span id="progressCurrent">0</span>
        <span id="progressTotal">0</span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <div class="controls">
      <button type="button" id="prevBtn" title="Previous" aria-label="Previous">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M7 6v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M18 6l-7 6 7 6V6z" fill="currentColor"/>
        </svg>
      </button>
      <button type="button" id="playPauseBtn" class="primary" title="Play / Pause" aria-label="Play or pause">
        <span id="playIcon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M9 7l10 5-10 5V7z" fill="currentColor"/>
          </svg>
        </span>
        <span id="pauseIcon" style="display:none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M7 5h4v14H7V5zm6 0h4v14h-4V5z" fill="currentColor"/>
          </svg>
        </span>
      </button>
      <button type="button" id="stopBtn" title="Stop" aria-label="Stop">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M7 7h10v10H7V7z" fill="currentColor"/>
        </svg>
      </button>
      <button type="button" id="nextBtn" title="Next" aria-label="Next">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M17 6v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M6 6l7 6-7 6V6z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
